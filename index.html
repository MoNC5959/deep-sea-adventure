<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Deep Sea Adventure</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#000;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    min-height:100vh;
    font-family:'Courier New',monospace;
  }
  canvas {
    display:block;
    image-rendering:pixelated;
    border:2px solid #2a7aaa;
    box-shadow:0 0 40px rgba(42,122,170,0.4);
    cursor:crosshair;
  }
  #hint {
    color:#4a8aaa; font-size:12px; margin-top:10px;
    font-family:monospace; letter-spacing:0.1em;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hint">
  WASD/ARROWS — Move &nbsp;|&nbsp; Mouse — Aim &nbsp;|&nbsp; Space — Dash
  Left-Click — Toggle Auto-Fire &nbsp;|&nbsp; Right-Click / X — Rocket ×3 (Homing after Level 1)
</div>
<script>
// ══════════════════════════════════════════════════════
//  DEEP SEA ADVENTURE  —  Top-Down Shooter
// ══════════════════════════════════════════════════════
const W=800, H=480;
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
canvas.width=W; canvas.height=H;

// World dimensions (camera scrolls within this)
const WORLD_W=3200, WORLD_H=2400;

// ── AUDIO ─────────────────────────────────────────────
let audio=null;
function initAudio(){
  if(audio) return;
  audio=new(window.AudioContext||window.webkitAudioContext)();
  audio.resume();
}

function tone(freq,type,dur,vol=0.25,freqEnd=null){
  if(!audio) return;
  try{
    const o=audio.createOscillator(), g=audio.createGain();
    o.connect(g); g.connect(audio.destination);
    o.type=type;
    o.frequency.setValueAtTime(freqEnd||freq, audio.currentTime);
    if(freqEnd) o.frequency.exponentialRampToValueAtTime(freq, audio.currentTime+dur);
    g.gain.setValueAtTime(vol, audio.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime+dur);
    o.start(); o.stop(audio.currentTime+dur);
  }catch(e){}
}
const sfx={
  shoot:   ()=>tone(520,'square',0.07,0.13),
  hit:     ()=>tone(260,'sawtooth',0.10,0.18,480),
  explode: ()=>tone(80,'sawtooth',0.30,0.32,260),
  rocket:  ()=>{ tone(200,'sawtooth',0.14,0.28,400); setTimeout(()=>tone(90,'square',0.5,0.2,35),120); },
  phit:    ()=>tone(110,'square',0.35,0.42,360),
  over:    ()=>[440,330,220,110].forEach((f,i)=>setTimeout(()=>tone(f,'square',0.28,0.3),i*200)),
  levelup: ()=>[330,440,550,660].forEach((f,i)=>setTimeout(()=>tone(f,'square',0.18,0.22),i*110)),
  warning: ()=>{ tone(220,'square',0.5,0.3,180); setTimeout(()=>tone(260,'square',0.5,0.3,180),600); },
  homing:  ()=>tone(800,'sine',0.12,0.18,1200),
  chomp:   ()=>tone(80,'sawtooth',0.18,0.35,200),
  inkblob: ()=>tone(180,'sine',0.15,0.2,80),
  rockimp: ()=>tone(60,'sawtooth',0.22,0.28,150),
  phase:   ()=>[880,660,440].forEach((f,i)=>setTimeout(()=>tone(f,'square',0.14,0.2),i*80)),
};

// ── STATE ─────────────────────────────────────────────
let state='menu';
let score=0, highScore=+localStorage.getItem('dsa_hs')||0;
let lives=3, frame=0, difficulty=1, spawnTimer=0, spawnRate=120;

// ── CAMERA ────────────────────────────────────────────
let camX=0, camY=0;   // camera top-left in world space (smoothly lerped)

// ── ROCKETS ───────────────────────────────────────────
const ROCKET_MAX=3, ROCKET_CD=500;
let rocketAmmo=ROCKET_MAX, rocketTimers=[];
let rockets=[];

// ── LEVEL / BOSS ──────────────────────────────────────
let level=1;                          // 1, 2, 3
let xp=0;
const XP_PER_LEVEL=[500,700,1000];    // xp needed to finish each level
let levelState='playing';             // 'playing'|'warning'|'boss'|'transition'|'thanks'
let levelStateTimer=0;
let bosses=[];
let bossProjectiles=[];
let cthulhuPhase=1;                   // 1=large, 2=medium×2, 3=small×4
let hasHoming=false, backupCount=0;  // 0=none, 1=one ship, 2=two ships
let octopusBossDefeated=false;        // regular octopi shoot faster after boss is beaten
let homingMissiles=[];
let homingCD=0;
const HOMING_CD_MAX=240;

// ── DASH ──────────────────────────────────────────────
let dashCD=0;
const DASH_CD_MAX=120;   // 2s cooldown
let dashVx=0, dashVy=0, dashTimer=0;
let dashTrails=[];        // afterimage ghosts

// ── HEALING ITEMS ─────────────────────────────────────
let healItem=null;            // only one on screen at a time
let dmgDealt=0;               // damage dealt since last pickup spawned
const HEAL_DMG_THRESHOLD=50;  // spawn after 50 damage dealt

// ── INPUT ─────────────────────────────────────────────
const keys={};
// mx/my are in SCREEN space; convert to world space when needed
let mxScreen=W/2, myScreen=H/2;
let autoFire=false;   // toggled by left-click

window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  initAudio();
  if(e.code==='Space'){
    if(state==='menu') startGame();
    else if(state==='gameover') state='menu';
    else if(levelState==='thanks') { state='menu'; levelState='playing'; }
    else if(state==='playing') doDash();
  }
  if(e.code==='KeyX' && state==='playing') fireRocket();
});
window.addEventListener('keyup',e=>{ keys[e.code]=false; });

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mxScreen=(e.clientX-r.left)*(W/r.width);
  myScreen=(e.clientY-r.top)*(H/r.height);
});

canvas.addEventListener('mousedown',e=>{
  initAudio();
  if(e.button===0){
    if(state==='menu')     { startGame(); return; }
    if(state==='gameover') { state='menu'; return; }
    if(levelState==='thanks') { state='menu'; levelState='playing'; return; }
    // Toggle auto-fire while playing
    autoFire=!autoFire;
  }
  if(e.button===2 && state==='playing') fireRocket();
});
canvas.addEventListener('contextmenu',e=>e.preventDefault());

// ── PLAYER ────────────────────────────────────────────
const player={
  x:WORLD_W/2, y:WORLD_H/2, r:18,
  speed:3.2, angle:0,
  shootCD:0, invincible:false, invTimer:0,
};
let bullets=[], enemies=[], particles=[], popups=[];

// ── BACKGROUND ────────────────────────────────────────
let bgRocks=[], bgCoral=[], caustics=[], bgBubbles=[];

function initBg(){
  // Rocks and coral spread across entire world
  bgRocks=Array.from({length:140},()=>({
    x:Math.random()*WORLD_W, y:Math.random()*WORLD_H,
    r:10+Math.random()*35, shade:Math.floor(Math.random()*3),
  }));
  bgCoral=Array.from({length:90},()=>({
    x:Math.random()*WORLD_W, y:Math.random()*WORLD_H,
    r:8+Math.random()*14,
    col:['#cc2244','#dd6622','#2288aa','#aa44bb'][Math.floor(Math.random()*4)],
    arms:3+Math.floor(Math.random()*5),
    baseAng:Math.random()*Math.PI*2,
  }));
  // Caustics animate; store as world positions but many of them
  caustics=Array.from({length:120},()=>({
    x:Math.random()*WORLD_W, y:Math.random()*WORLD_H,
    r:20+Math.random()*38, ph:Math.random()*Math.PI*2,
    spd:0.013+Math.random()*0.018,
  }));
  // Bubbles are screen-space (always visible), no world position needed
  bgBubbles=Array.from({length:26},()=>({
    x:Math.random()*W, y:Math.random()*H,
    r:2+Math.random()*4, spd:0.22+Math.random()*0.44,
    wob:Math.random()*Math.PI*2,
  }));
}

// Draw world-space background (ctx already translated by camera)
function drawWorldBg(){
  // Dark ocean floor
  const gr=ctx.createRadialGradient(player.x,player.y,60,player.x,player.y,WORLD_W*0.5);
  gr.addColorStop(0,'#0e2a48'); gr.addColorStop(1,'#040d1a');
  ctx.fillStyle=gr; ctx.fillRect(0,0,WORLD_W,WORLD_H);

  const vl=camX-40, vr=camX+W+40, vt=camY-40, vb=camY+H+40;

  // Caustics (only visible ones)
  caustics.forEach(c=>{
    if(c.x<vl||c.x>vr||c.y<vt||c.y>vb) return;
    c.ph+=c.spd;
    const a=0.03+0.022*Math.sin(c.ph);
    ctx.strokeStyle=`rgba(80,160,255,${a})`; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(c.x,c.y,c.r*(0.72+0.28*Math.sin(c.ph)),0,Math.PI*2); ctx.stroke();
  });

  // Rocks
  const rockCol=['#1a2938','#141f2e','#0d1824'];
  bgRocks.forEach(r=>{
    if(r.x+r.r<vl||r.x-r.r>vr||r.y+r.r<vt||r.y-r.r>vb) return;
    ctx.fillStyle=rockCol[r.shade];
    ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.04)';
    ctx.beginPath(); ctx.arc(r.x-r.r*0.3,r.y-r.r*0.3,r.r*0.42,0,Math.PI*2); ctx.fill();
  });

  // Coral
  bgCoral.forEach(c=>{
    if(c.x+c.r*2<vl||c.x-c.r*2>vr||c.y+c.r*2<vt||c.y-c.r*2>vb) return;
    for(let i=0;i<c.arms;i++){
      const ang=c.baseAng+(i/c.arms)*Math.PI*2;
      const ex=c.x+Math.cos(ang)*c.r, ey=c.y+Math.sin(ang)*c.r;
      ctx.strokeStyle=c.col; ctx.lineWidth=3; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(c.x,c.y); ctx.lineTo(ex,ey); ctx.stroke();
      ctx.fillStyle=c.col;
      ctx.beginPath(); ctx.arc(ex,ey,3.5,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.beginPath(); ctx.arc(c.x,c.y,2.5,0,Math.PI*2); ctx.fill();
  });
}

// Screen-space ambient bubbles (drawn after camera restore)
function drawScreenBubbles(){
  bgBubbles.forEach(b=>{
    b.y-=b.spd; b.wob+=0.04; b.x+=Math.sin(b.wob)*0.3;
    if(b.y<-8){ b.y=H+8; b.x=Math.random()*W; }
    ctx.strokeStyle='rgba(130,200,255,0.26)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.stroke();
  });
}

// ── DRAW SUBMARINE (top-down) ─────────────────────────
function drawSub(){
  const {x,y,angle,invincible}=player;
  if(invincible && Math.floor(frame/5)%2===0) return;
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(4,5,32,14,0,0,Math.PI*2); ctx.fill();
  // Hull
  ctx.fillStyle='#4a7898';
  ctx.beginPath(); ctx.ellipse(0,0,28,13,0,0,Math.PI*2); ctx.fill();
  // Highlight
  ctx.fillStyle='#608cb2';
  ctx.beginPath(); ctx.ellipse(-2,-2,22,9,0,0,Math.PI*2); ctx.fill();
  // Conning tower
  ctx.fillStyle='#3a6880';
  ctx.beginPath(); ctx.ellipse(-2,0,10,6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#2a5870';
  ctx.beginPath(); ctx.arc(-2,0,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#88ccee';
  ctx.beginPath(); ctx.arc(-2,0,2,0,Math.PI*2); ctx.fill();
  // Nose
  ctx.fillStyle='#f4c830';
  ctx.beginPath(); ctx.moveTo(26,-5); ctx.lineTo(36,0); ctx.lineTo(26,5); ctx.closePath(); ctx.fill();
  // Torpedo tube
  ctx.fillStyle='#2a5870'; ctx.fillRect(18,-2,10,4);
  // Propeller
  ctx.save(); ctx.translate(-30,0);
  for(let i=0;i<3;i++){
    ctx.save(); ctx.rotate(frame*0.22+i*(Math.PI*2/3));
    ctx.fillStyle='#68a8c0';
    ctx.beginPath(); ctx.ellipse(0,-6,2.5,7,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.restore();
  // Stern fins
  ctx.fillStyle='#2e5e78';
  ctx.beginPath(); ctx.moveTo(-18,-13); ctx.lineTo(-28,-13); ctx.lineTo(-28,0); ctx.lineTo(-18,0); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-18,13);  ctx.lineTo(-28,13);  ctx.lineTo(-28,0); ctx.lineTo(-18,0); ctx.closePath(); ctx.fill();

  ctx.restore();

  // Engine bubbles (world space)
  const bx=x+Math.cos(angle+Math.PI)*30;
  const by=y+Math.sin(angle+Math.PI)*14;
  if(frame%6===0) spawnBubble(bx+(Math.random()-0.5)*6,by+(Math.random()-0.5)*6);
}

// ── TORPEDO ───────────────────────────────────────────
function drawTorpedo(b){
  ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.angle);
  ctx.fillStyle='rgba(244,232,48,0.18)';
  ctx.beginPath(); ctx.ellipse(-14,0,13,3.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#f4e830';
  ctx.beginPath(); ctx.ellipse(0,0,13,4,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#f4c830';
  ctx.beginPath(); ctx.moveTo(11,-1); ctx.lineTo(20,0); ctx.lineTo(11,1); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#d0a020';
  ctx.beginPath(); ctx.moveTo(-8,-1); ctx.lineTo(-16,-7); ctx.lineTo(-10,-1); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-8,1);  ctx.lineTo(-16,7);  ctx.lineTo(-10,1);  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ── ROCKET ────────────────────────────────────────────
function drawRocket(r){
  ctx.save(); ctx.translate(r.x,r.y); ctx.rotate(r.angle);
  if(r.mini) ctx.scale(0.6,0.6);
  // Exhaust trail
  for(let i=0;i<5;i++){
    const a=(5-i)*0.08;
    ctx.fillStyle=`rgba(255,${120-i*22},0,${a})`;
    ctx.beginPath(); ctx.arc(-(16+i*9),0,5+i*2.5,0,Math.PI*2); ctx.fill();
  }
  // Body
  ctx.fillStyle='#cc2828';
  ctx.beginPath(); ctx.ellipse(0,0,18,6,0,0,Math.PI*2); ctx.fill();
  // Warhead
  ctx.fillStyle='#ff4422';
  ctx.beginPath(); ctx.moveTo(14,-6); ctx.lineTo(28,0); ctx.lineTo(14,6); ctx.closePath(); ctx.fill();
  // Tail fins
  ctx.fillStyle='#881818';
  for(let s=-1;s<=1;s+=2){
    ctx.beginPath(); ctx.moveTo(-10,s*2); ctx.lineTo(-22,s*12); ctx.lineTo(-8,s*2); ctx.closePath(); ctx.fill();
  }
  // Window
  ctx.fillStyle='#ffaa00'; ctx.beginPath(); ctx.arc(-1,0,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,220,100,0.8)'; ctx.beginPath(); ctx.arc(0,-1,1.5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── ENEMY SPRITES (top-down) ──────────────────────────
// All sprites drawn with HEAD at -x, TAIL at +x.
// drawAngle = moveAngle + PI  → head faces movement direction.

function drawClownfish(e){
  ctx.save(); ctx.translate(e.x,e.y); ctx.rotate(e.drawAngle);
  const t=Math.sin(e.anim*0.12)*3;
  ctx.fillStyle='#ff6b35';
  ctx.beginPath(); ctx.moveTo(e.w/2,0); ctx.lineTo(e.w/2+14,-9+t); ctx.lineTo(e.w/2+14,9+t); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#ff6b35';
  ctx.beginPath(); ctx.ellipse(0,0,e.w/2,e.h/2,0,0,Math.PI*2); ctx.fill();
  ctx.save();
  ctx.beginPath(); ctx.ellipse(0,0,e.w/2,e.h/2,0,0,Math.PI*2); ctx.clip();
  ctx.fillStyle='#fff'; ctx.fillRect(-9,-e.h/2,12,e.h); ctx.fillRect(8,-e.h/2,9,e.h);
  ctx.restore();
  ctx.strokeStyle='#cc4010'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(0,0,e.w/2,e.h/2,0,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='#ff8c55'; ctx.fillRect(-e.w/2+4,-2.5,e.w-16,5);
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-e.w/2+9,-2,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-e.w/2+10,-3,1.6,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawJellyfish(e){
  const pulse=0.82+Math.sin(e.anim*0.14)*0.18;
  ctx.save(); ctx.translate(e.x,e.y);
  ctx.strokeStyle='rgba(155,89,182,0.5)'; ctx.lineWidth=2; ctx.lineCap='round';
  for(let i=0;i<8;i++){
    const ang=(i/8)*Math.PI*2, len=14+Math.sin(e.anim*0.1+i)*5;
    ctx.beginPath();
    ctx.moveTo(Math.cos(ang)*e.w/2*pulse, Math.sin(ang)*e.w/2*pulse);
    ctx.quadraticCurveTo(
      Math.cos(ang)*len*1.3+Math.sin(ang+e.anim*0.05)*5,
      Math.sin(ang)*len*1.3-Math.cos(ang+e.anim*0.05)*5,
      Math.cos(ang)*len*2.1, Math.sin(ang)*len*2.1
    );
    ctx.stroke();
  }
  ctx.fillStyle='rgba(150,85,178,0.85)';
  ctx.beginPath(); ctx.arc(0,0,e.w/2*pulse,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(200,130,225,0.6)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(0,0,e.w/2*pulse,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='rgba(215,155,240,0.35)';
  ctx.beginPath(); ctx.arc(-3,-3,e.w*0.22*pulse,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawPufferfish(e){
  const puffed=e.health<e.maxHealth;
  const r=puffed?e.w/2*1.3:e.w/2;
  ctx.save(); ctx.translate(e.x,e.y);
  ctx.fillStyle=puffed?'#e8a830':'#28b860';
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  if(puffed){
    ctx.fillStyle='#bf7a18';
    for(let i=0;i<12;i++){
      const ang=(i/12)*Math.PI*2;
      ctx.save(); ctx.rotate(ang);
      ctx.beginPath(); ctx.moveTo(r-2,0); ctx.lineTo(r+13,-4); ctx.lineTo(r+13,4); ctx.closePath(); ctx.fill();
      ctx.restore();
    }
  } else {
    ctx.fillStyle='#19863c';
    for(let i=0;i<6;i++){
      const ang=(i/6)*Math.PI*2;
      ctx.beginPath(); ctx.arc(Math.cos(ang)*r*0.52,Math.sin(ang)*r*0.52,3,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-r*0.22,-r*0.22,4.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-r*0.14,-r*0.3,1.8,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawAnglerfish(e){
  ctx.save(); ctx.translate(e.x,e.y); ctx.rotate(e.drawAngle);
  ctx.fillStyle='#192848';
  ctx.beginPath(); ctx.ellipse(0,0,e.w/2,e.h/2,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#283858'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(0,0,e.w/2-5,e.h/2-4,0,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='#192848';
  ctx.beginPath(); ctx.moveTo(e.w/2,0); ctx.lineTo(e.w/2+18,-12); ctx.lineTo(e.w/2+18,12); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#121e38';
  for(let s=-1;s<=1;s+=2){
    ctx.beginPath(); ctx.ellipse(4,s*(e.h/2-1),12,5,Math.PI*0.2,0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle='#0b1626';
  ctx.beginPath();
  ctx.moveTo(-e.w/2,8); ctx.quadraticCurveTo(-e.w/2-12,0,-e.w/2,-8);
  ctx.lineTo(-e.w/2+20,0); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#ddd6b4';
  for(let i=0;i<5;i++){
    ctx.beginPath(); ctx.moveTo(-e.w/2+i*4,4); ctx.lineTo(-e.w/2+i*4+2,-6); ctx.lineTo(-e.w/2+i*4+4,4); ctx.fill();
  }
  ctx.fillStyle='#eebe18'; ctx.beginPath(); ctx.arc(8,-9,8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000';    ctx.beginPath(); ctx.arc(8,-9,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';    ctx.beginPath(); ctx.arc(10,-11,2,0,Math.PI*2); ctx.fill();
  const lox=Math.sin(e.anim*0.07)*13, loy=-e.h/2-20;
  ctx.strokeStyle='#3e2e22'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-4,-e.h/2); ctx.quadraticCurveTo(10,-e.h/2-10,lox,loy); ctx.stroke();
  const ga=0.5+Math.sin(e.anim*0.14)*0.5;
  ctx.fillStyle=`rgba(255,200,50,${ga*0.4})`; ctx.beginPath(); ctx.arc(lox,loy,9,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=`rgba(255,230,100,${ga})`;    ctx.beginPath(); ctx.arc(lox,loy,4.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';                        ctx.beginPath(); ctx.arc(lox,loy,2,0,Math.PI*2); ctx.fill();

function drawOctopus(e){
  ctx.save(); ctx.translate(e.x,e.y);
  const p=0.9+Math.sin(e.anim*0.1)*0.1;
  // Tentacles
  ctx.strokeStyle='#6a28aa'; ctx.lineWidth=5; ctx.lineCap='round';
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2+e.anim*0.04;
    const len=e.w*0.7+Math.sin(e.anim*0.12+i)*8;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*e.w*0.3,Math.sin(a)*e.w*0.3);
    ctx.quadraticCurveTo(
      Math.cos(a+0.4)*len, Math.sin(a+0.4)*len,
      Math.cos(a+0.2)*len*1.5, Math.sin(a+0.2)*len*1.5
    );
    ctx.stroke();
  }
  // Body
  ctx.fillStyle='#9b3fd4';
  ctx.beginPath(); ctx.ellipse(0,0,e.w*0.4*p,e.h*0.35*p,0,0,Math.PI*2); ctx.fill();
  // Head dome
  ctx.fillStyle='#b554e8';
  ctx.beginPath(); ctx.ellipse(0,-e.h*0.08,e.w*0.32,e.h*0.32,0,Math.PI,Math.PI*2); ctx.fill();
  // Eyes
  for(let s=-1;s<=1;s+=2){
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(s*e.w*0.12,-2,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(s*e.w*0.12,-2,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,200,100,0.7)'; ctx.beginPath(); ctx.arc(s*e.w*0.12+1,-3,1.5,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawShark(e){
  ctx.save(); ctx.translate(e.x,e.y); ctx.rotate(e.drawAngle);
  // Tail
  ctx.fillStyle='#4a7a8f';
  ctx.beginPath(); ctx.moveTo(e.w/2,0); ctx.lineTo(e.w/2+20,-14); ctx.lineTo(e.w/2+20,14); ctx.closePath(); ctx.fill();
  // Body
  ctx.fillStyle='#5a8a9f';
  ctx.beginPath(); ctx.ellipse(0,0,e.w/2,e.h/2,0,0,Math.PI*2); ctx.fill();
  // Belly
  ctx.fillStyle='#d8e8ee';
  ctx.beginPath(); ctx.ellipse(2,0,e.w*0.38,e.h*0.28,0,0,Math.PI*2); ctx.fill();
  // Dorsal fin
  ctx.fillStyle='#3a6a7f';
  ctx.beginPath(); ctx.moveTo(-4,-e.h/2); ctx.lineTo(-14,-e.h/2-20); ctx.lineTo(8,-e.h/2); ctx.closePath(); ctx.fill();
  // Side fins
  for(let s=-1;s<=1;s+=2){
    ctx.beginPath(); ctx.moveTo(4,s*e.h/2); ctx.lineTo(4,s*(e.h/2+14)); ctx.lineTo(-10,s*e.h/2); ctx.closePath(); ctx.fill();
  }
  // Snout + teeth
  ctx.fillStyle='#5a8a9f';
  ctx.beginPath(); ctx.ellipse(-e.w/2-6,0,8,e.h*0.28,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ddd';
  for(let i=0;i<4;i++){
    ctx.beginPath();
    ctx.moveTo(-e.w/2-2,i*5-8); ctx.lineTo(-e.w/2-12,i*5-6); ctx.lineTo(-e.w/2-2,i*5-4);
    ctx.closePath(); ctx.fill();
  }
  // Eye
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-e.w/2+8,-5,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.beginPath(); ctx.arc(-e.w/2+8,-5,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-e.w/2+10,-7,1.8,0,Math.PI*2); ctx.fill();

// Boss drawing functions
function drawBossOctopus(b){

function drawBossShark(b){
  ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.drawAngle);

  // Tail
  ctx.fillStyle='#2a5a6f';
  ctx.beginPath(); ctx.moveTo(b.w/2,0); ctx.lineTo(b.w/2+28*sc,-18*sc); ctx.lineTo(b.w/2+28*sc,18*sc); ctx.closePath(); ctx.fill();
  // Body
  ctx.fillStyle='#3a6a7f';
  ctx.beginPath(); ctx.ellipse(0,0,b.w/2,b.h/2,0,0,Math.PI*2); ctx.fill();

  ctx.beginPath(); ctx.ellipse(4,0,b.w*0.38,b.h*0.28,0,0,Math.PI*2); ctx.fill();
  // Dorsal fin
  ctx.fillStyle='#1a4a5f';
  ctx.beginPath(); ctx.moveTo(-6,-b.h/2); ctx.lineTo(-22,-b.h/2-32); ctx.lineTo(10,-b.h/2); ctx.closePath(); ctx.fill();
  // Side fins
  for(let s=-1;s<=1;s+=2){
    ctx.beginPath(); ctx.moveTo(6,s*b.h/2); ctx.lineTo(6,s*(b.h/2+20)); ctx.lineTo(-14,s*b.h/2); ctx.closePath(); ctx.fill();
  }
  // Snout
  ctx.fillStyle='#3a6a7f';
  ctx.beginPath(); ctx.ellipse(-b.w/2-8,0,10,b.h*0.28,0,0,Math.PI*2); ctx.fill();

function drawBossCthulhu(b){
  const sc=b.phase===1?1:b.phase===2?0.7:0.45;
  ctx.save(); ctx.translate(b.x,b.y);
  // Aura
  const hpPct=b.health/b.maxHealth;
  const gr=ctx.createRadialGradient(0,0,0,0,0,80*sc);
  gr.addColorStop(0,`rgba(0,180,120,${0.12*(2-hpPct)})`); gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(0,0,100*sc,0,Math.PI*2); ctx.fill();
  // Tentacles around head
  ctx.strokeStyle='#1a4a38'; ctx.lineWidth=7*sc; ctx.lineCap='round';
  for(let i=0;i<12;i++){
    const a=(i/12)*Math.PI*2+b.anim*0.02;
    const len=(42+Math.sin(b.anim*0.08+i)*10)*sc;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*28*sc,Math.sin(a)*28*sc);
    ctx.quadraticCurveTo(Math.cos(a+0.5)*len*1.2,Math.sin(a+0.5)*len*1.2,Math.cos(a+0.25)*len*1.9,Math.sin(a+0.25)*len*1.9);
    ctx.stroke();
  }
  // Facial tentacles (lower)
  ctx.lineWidth=4*sc;
  for(let i=0;i<8;i++){
    const a=Math.PI*0.2+i*Math.PI*0.08+Math.sin(b.anim*0.06+i)*0.15;
    ctx.strokeStyle='#1a3a28';
    ctx.beginPath(); ctx.moveTo(Math.cos(a)*20*sc,Math.sin(a)*20*sc);
    ctx.quadraticCurveTo(Math.cos(a)*45*sc,Math.sin(a)*35*sc+12*sc,Math.cos(a)*30*sc,Math.sin(a)*60*sc+20*sc);
    ctx.stroke();
  }
  // Body
  ctx.fillStyle='#0d2a1e';
  ctx.beginPath(); ctx.ellipse(0,0,44*sc,54*sc,0,0,Math.PI*2); ctx.fill();
  // Head
  ctx.fillStyle='#123d2c';
  ctx.beginPath(); ctx.ellipse(0,-16*sc,36*sc,32*sc,0,0,Math.PI*2); ctx.fill();
  // Wings
  ctx.fillStyle='#0a2018';
  for(let s=-1;s<=1;s+=2){
    ctx.beginPath();
    ctx.moveTo(s*40*sc,-10*sc);
    ctx.quadraticCurveTo(s*80*sc,-40*sc,s*60*sc,30*sc);
    ctx.quadraticCurveTo(s*30*sc,20*sc,s*40*sc,-10*sc);
    ctx.fill();
  }
  // Eyes (glowing)
  const ga=0.6+Math.sin(b.anim*0.14)*0.4;
  for(let s=-1;s<=1;s+=2){
    ctx.fillStyle=`rgba(0,255,160,${ga*0.25})`; ctx.beginPath(); ctx.arc(s*14*sc,-18*sc,12*sc,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#00ff90'; ctx.beginPath(); ctx.arc(s*14*sc,-18*sc,6*sc,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#001a0d'; ctx.beginPath(); ctx.arc(s*14*sc,-18*sc,4*sc,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(0,255,160,0.8)'; ctx.beginPath(); ctx.arc(s*16*sc,-20*sc,2*sc,0,Math.PI*2); ctx.fill();
  }
  // Phase indicator cracks
  if(b.phase>=2){
    ctx.strokeStyle='rgba(0,255,120,0.4)'; ctx.lineWidth=2;
    for(let i=0;i<4;i++){
      const a=i*Math.PI*0.5+0.3;
      ctx.beginPath(); ctx.moveTo(Math.cos(a)*10*sc,Math.sin(a)*10*sc);
      ctx.lineTo(Math.cos(a+0.4)*36*sc,Math.sin(a+0.4)*36*sc); ctx.stroke();
    }
  }
  ctx.restore();
}

// Backup sub drawing
function drawBackupSubs(){
  if(backupCount===0) return;
  const offsets=backupCount>=2?[{sign:1},{sign:-1}]:[{sign:1}];
  offsets.forEach(o=>{
    const side=player.angle+o.sign*Math.PI/2;
    const bx=player.x+Math.cos(side)*58;
    const by=player.y+Math.sin(side)*58;
    ctx.save(); ctx.translate(bx,by); ctx.rotate(player.angle);
    ctx.globalAlpha=0.82;
    ctx.fillStyle='#3a6080';
    ctx.beginPath(); ctx.ellipse(0,0,18,8,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#4a7a9a';
    ctx.beginPath(); ctx.ellipse(-1,-1,14,6,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f4c830';
    ctx.beginPath(); ctx.moveTo(16,-3); ctx.lineTo(22,0); ctx.lineTo(16,3); ctx.closePath(); ctx.fill();
    // propeller
    ctx.save(); ctx.translate(-18,0);
    for(let i=0;i<3;i++){
      ctx.save(); ctx.rotate(frame*0.22+i*(Math.PI*2/3));
      ctx.fillStyle='#68a8c0';
      ctx.beginPath(); ctx.ellipse(0,-4,1.5,5,0,0,Math.PI*2); ctx.fill();
      ctx.restore();

    ctx.restore();

}

function spawnBigExplosion(x,y){
  for(let i=0;i<32;i++){
    const ang=(i/32)*Math.PI*2, spd=2+Math.random()*8;
    particles.push({type:'spark',x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,r:3+Math.random()*7,life:32+Math.random()*28,maxLife:60,color:'#ff5533'});
  }

    const ang=Math.random()*Math.PI*2, spd=1+Math.random()*5;
    particles.push({type:'spark',x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,r:2+Math.random()*4,life:20+Math.random()*22,maxLife:42,color:'#ffaa00'});
  }
  particles.push({type:'shockwave',x,y,maxR:120,life:22,maxLife:22});
  for(let i=0;i<12;i++) spawnBubble(x+(Math.random()-0.5)*45,y+(Math.random()-0.5)*45);
}
function updateParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.life--;
    if(p.type==='bubble')     { p.x+=p.vx; p.y+=p.vy; p.vy-=0.04; }
    else if(p.type==='spark') { p.x+=p.vx; p.y+=p.vy; p.vx*=0.97; p.vy*=0.97; }
  });
}
function drawParticles(){
  particles.forEach(p=>{
    const a=p.life/p.maxLife;
    if(p.type==='shockwave'){
      const pct=1-a;
      ctx.strokeStyle=`rgba(255,140,30,${a*0.85})`; ctx.lineWidth=2.5+2*a;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.maxR*pct,0,Math.PI*2); ctx.stroke();
    } else if(p.type==='bubble'){
      ctx.strokeStyle=`rgba(140,210,255,${a*0.5})`; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.stroke();
    } else {
      const hex=Math.floor(a*255).toString(16).padStart(2,'0');
      ctx.fillStyle=(p.color||'#ff8800')+hex;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*a,0,Math.PI*2); ctx.fill();
    }
  });
}

// ── ENEMIES ───────────────────────────────────────────
const ECFG={
  clownfish:  {w:36,h:24,hp:1,spd:1.7, pts:10, color:'#ff6b35'},
  jellyfish:  {w:34,h:30,hp:2,spd:0.9, pts:20, color:'#9b59b6'},
  pufferfish: {w:38,h:38,hp:3,spd:0.65,pts:30, color:'#28b860'},
  anglerfish: {w:52,h:34,hp:2,spd:2.1, pts:50, color:'#192848'},
  octopus:    {w:54,h:54,hp:4,spd:1.1, pts:60, color:'#7f3fbf'},
  shark:      {w:64,h:32,hp:3,spd:2.4, pts:80, color:'#5a8a9f'},
};

function spawnEnemy(){
  if(levelState==='transition'||levelState==='warning'||levelState==='thanks') return;
  const r=Math.random();
  let type;
  if(level===1){
    type=r<0.4?'clownfish':r<0.65?'jellyfish':r<0.85?'pufferfish':'anglerfish';
  } else if(level===2){
    type=r<0.30?'clownfish':r<0.50?'jellyfish':r<0.65?'pufferfish':r<0.80?'anglerfish':'octopus';
  } else {
    type=r<0.20?'clownfish':r<0.35?'jellyfish':r<0.50?'pufferfish':r<0.65?'anglerfish':r<0.82?'octopus':'shark';
  }
  const c=ECFG[type];
  // Spawn at edges of current viewport (in world space)
  const side=Math.floor(Math.random()*4);
  const m=c.w+40;
  let ex,ey;
  if(side===0)      { ex=camX+Math.random()*W;  ey=camY-m; }
  else if(side===1) { ex=camX+W+m;              ey=camY+Math.random()*H; }
  else if(side===2) { ex=camX+Math.random()*W;  ey=camY+H+m; }
  else              { ex=camX-m;                ey=camY+Math.random()*H; }
  const spd=(c.spd+difficulty*0.2)*(0.85+Math.random()*0.3);
  const dx=player.x-ex, dy=player.y-ey;
  const dist=Math.sqrt(dx*dx+dy*dy)||1;
  const moveAng=Math.atan2(dy,dx);
  enemies.push({
    type,x:ex,y:ey,
    vx:(dx/dist)*spd,vy:(dy/dist)*spd,
    speed:spd,w:c.w,h:c.h,
    health:c.hp,maxHealth:c.hp,
    points:c.pts,color:c.color,
    moveAng,drawAngle:moveAng+Math.PI,
    anim:0,hitFlash:0,
  });
}

// ── COLLISION HELPERS ─────────────────────────────────
function dist2(ax,ay,bx,by){ return (ax-bx)**2+(ay-by)**2; }

// ── GAME ACTIONS ──────────────────────────────────────
function shoot(){
  if(player.shootCD>0) return;
  const ang=player.angle;
  bullets.push({
    x:player.x+Math.cos(ang)*32,
    y:player.y+Math.sin(ang)*16,
    vx:Math.cos(ang)*10, vy:Math.sin(ang)*10,
    angle:ang, life:90,
  });
  player.shootCD=12; sfx.shoot();
}

function fireRocket(){
  if(rocketAmmo<=0) return;
  rocketAmmo--;
  rocketTimers.push(ROCKET_CD);
  const ang=player.angle;
  const spd=7.5;
  // After Level 1 unlock, rockets are homing
  const homing=hasHoming;
  rockets.push({
    x:player.x+Math.cos(ang)*36,
    y:player.y+Math.sin(ang)*16,
    vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
    angle:ang, life:180, homing,
  });
  sfx.rocket();
  // Backup subs fire mini rockets simultaneously
  if(backupCount>0){
    const offsets=backupCount>=2?[Math.PI/2,-Math.PI/2]:[Math.PI/2];
    offsets.forEach(off=>{
      const side=player.angle+off;
      const bx=player.x+Math.cos(side)*58, by=player.y+Math.sin(side)*58;
      rockets.push({
        x:bx+Math.cos(ang)*28, y:by+Math.sin(ang)*12,
        vx:Math.cos(ang)*7.5, vy:Math.sin(ang)*7.5,
        angle:ang, life:180, homing:hasHoming, mini:true,
      });
    });
  }
}

function rocketExplode(r){
  spawnBigExplosion(r.x,r.y); sfx.explode();
  const RADIUS=120;
  enemies.forEach(e=>{
    if(dist2(r.x,r.y,e.x,e.y)<RADIUS*RADIUS){ e.health-=6; e.hitFlash=20; trackDamage(6); }
  });
  bosses.forEach(b=>{
    if(dist2(r.x,r.y,b.x,b.y)<RADIUS*RADIUS){ b.health-=6; b.hitFlash=20; trackDamage(6); }
  });
  // Homing rockets split into 2 mini homing missiles
  if(r.homing){
    for(let s=-1;s<=1;s+=2){
      const splitAng=r.angle+s*0.45;
      homingMissiles.push({x:r.x,y:r.y,vx:Math.cos(splitAng)*8,vy:Math.sin(splitAng)*8,angle:splitAng,life:160,mini:true});
    }
  }
}

function fireHoming(){
  if(!hasHoming||homingCD>0) return;
  homingCD=HOMING_CD_MAX; sfx.homing();
  // Fire from player position toward nearest boss/enemy
  const target=bosses.length>0?bosses[0]:(enemies.length>0?enemies[0]:null);
  const ang=target?Math.atan2(target.y-player.y,target.x-player.x):player.angle;
  homingMissiles.push({x:player.x,y:player.y,vx:Math.cos(ang)*8,vy:Math.sin(ang)*8,angle:ang,life:200});
  if(backupCount>0){
    const bkOffsets=backupCount>=2?[Math.PI/2,-Math.PI/2]:[Math.PI/2];
    bkOffsets.forEach(off=>{
      const side=player.angle+off;
      const bx=player.x+Math.cos(side)*58, by=player.y+Math.sin(side)*58;
      homingMissiles.push({x:bx,y:by,vx:Math.cos(ang)*8,vy:Math.sin(ang)*8,angle:ang,life:200});
    });
  }
}

// Spawn boss at viewport edge
function spawnBoss(type){
  const side=Math.floor(Math.random()*4);
  const m=120;
  let bx,by;
  if(side===0)      { bx=player.x+(Math.random()-0.5)*W*0.6; by=camY-m; }
  else if(side===1) { bx=camX+W+m; by=player.y+(Math.random()-0.5)*H*0.6; }
  else if(side===2) { bx=player.x+(Math.random()-0.5)*W*0.6; by=camY+H+m; }
  else              { bx=camX-m; by=player.y+(Math.random()-0.5)*H*0.6; }

  if(type==='octopus'){
    bosses.push({type:'octopus',x:bx,y:by,vx:0,vy:0,w:120,h:120,
      health:120,maxHealth:120,anim:0,hitFlash:0,
      shootCD:60, orbitAng:0, drawAngle:0, spawnAlpha:0});
  } else if(type==='shark'){
    const sharkHP=Math.round(180*0.6); // 108 HP each (60% of original 180)
    // Spawn two sharks on opposite sides
    for(let i=0;i<2;i++){
      const ang2=i*Math.PI; // opposite sides
      const r2=180;
      const sx=player.x+Math.cos(ang2)*r2, sy=player.y+Math.sin(ang2)*r2;
      // Stagger rush CDs so they don't rush simultaneously
      bosses.push({type:'shark',x:sx,y:sy,vx:0,vy:0,w:120,h:60,
        health:sharkHP,maxHealth:sharkHP,anim:0,hitFlash:0,
        eatCD:i*180,rushCD:60+i*150,rushing:false,rushTimer:0,rushVx:0,rushVy:0,
        windingUp:false,windTimer:0,drawAngle:0, spawnAlpha:0});
    }
  } else if(type==='cthulhu'){
    cthulhuPhase=1;
    spawnCthulhuPhase(1);
  }
}

function spawnCthulhuPhase(phase){
  bosses=[];
  const count=phase===1?1:phase===2?2:4;
  const hp=phase===1?200:phase===2?90:45;
  const sc=phase===1?1:phase===2?0.7:0.45;
  for(let i=0;i<count;i++){
    const ang=(i/count)*Math.PI*2;
    const r=phase===1?0:120;
    bosses.push({
      type:'cthulhu',phase,x:player.x+Math.cos(ang)*r,y:player.y+Math.sin(ang)*r,
      vx:0,vy:0,w:120*sc,h:120*sc,health:hp,maxHealth:hp,anim:0,hitFlash:0,
      shootCD:60+Math.floor(i*40),drawAngle:0, spawnAlpha:0,
    });
  }
  sfx.phase();
}

function fireBackupSubs(){
  if(backupCount===0) return;
  const offsets=backupCount>=2?[Math.PI/2,-Math.PI/2]:[Math.PI/2];
  offsets.forEach(off=>{
    const side=player.angle+off;
    const bx=player.x+Math.cos(side)*58, by=player.y+Math.sin(side)*58;
    bullets.push({
      x:bx+Math.cos(player.angle)*20, y:by+Math.sin(player.angle)*10,
      vx:Math.cos(player.angle)*9, vy:Math.sin(player.angle)*9,
      angle:player.angle, life:80,
    });
  });
}

function doDash(){
  if(dashCD>0) return;
  dashCD=DASH_CD_MAX;
  let dx=0, dy=0;
  if(keys['ArrowUp']   ||keys['KeyW']) dy=-1;
  if(keys['ArrowDown'] ||keys['KeyS']) dy= 1;
  if(keys['ArrowLeft'] ||keys['KeyA']) dx=-1;
  if(keys['ArrowRight']||keys['KeyD']) dx= 1;
  if(dx===0&&dy===0){ dx=Math.cos(player.angle); dy=Math.sin(player.angle); }
  const mag=Math.sqrt(dx*dx+dy*dy)||1;
  dashVx=(dx/mag)*16; dashVy=(dy/mag)*16; dashTimer=10;
  // Full invincibility for the entire dash duration + small buffer
  player.invincible=true; player.invTimer=dashTimer+12;
}

function hitPlayer(){
  if(player.invincible) return;
  lives--; sfx.phit();
  spawnExplosion(player.x,player.y,'#5a8aaa');
  player.invincible=true; player.invTimer=130;
  if(lives<=0){
    state='gameover'; autoFire=false;
    if(score>highScore){ highScore=score; localStorage.setItem('dsa_hs',highScore); }
    sfx.over();
  }
}

}

function drawLevelBar(){

function drawBossHPBar(totalHP,totalMax,label){
  const bw=500, bh=22, bx=W/2-bw/2, by=8;
  const pct=Math.max(0,totalHP/totalMax);
  ctx.fillStyle='rgba(4,12,24,0.88)'; ctx.fillRect(bx-8,by-6,bw+16,bh+14);
  ctx.strokeStyle='#aa2222'; ctx.lineWidth=2; ctx.strokeRect(bx-8,by-6,bw+16,bh+14);
  ctx.fillStyle='#1a0808'; ctx.fillRect(bx,by,bw,bh);
  // Red gradient bar
  const gr=ctx.createLinearGradient(bx,0,bx+bw*pct,0);
  gr.addColorStop(0,'#cc2222'); gr.addColorStop(1,'#ff4444');
  ctx.fillStyle=gr; ctx.fillRect(bx,by,bw*pct,bh);
  ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(bx,by,bw*pct,bh/3);
  ctx.strokeStyle='#440000'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);
  // Pulse flash at low HP
  if(pct<0.25&&Math.floor(frame/10)%2===0){
    ctx.strokeStyle='rgba(255,0,0,0.5)'; ctx.lineWidth=3; ctx.strokeRect(bx-8,by-6,bw+16,bh+14);

  ctx.fillStyle='#fff'; ctx.font='bold 12px monospace'; ctx.textAlign='center';
  ctx.fillText(`⚠ ${label}  HP: ${Math.ceil(totalHP)} / ${totalMax}`,W/2,by+16);
  ctx.textAlign='left';
}

function roundedRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

}

// ── HEALING ITEMS ─────────────────────────────────────
function spawnHealItem(){
  // Spawn somewhere in the world within reach of the player (800-1600px away)
  const ang=Math.random()*Math.PI*2;
  const dist=800+Math.random()*800;
  const x=Math.max(80,Math.min(WORLD_W-80,player.x+Math.cos(ang)*dist));
  const y=Math.max(80,Math.min(WORLD_H-80,player.y+Math.sin(ang)*dist));
  healItem={x,y,pulse:0};
}

function drawHealItem(h){
  ctx.save(); ctx.translate(h.x,h.y);
  h.pulse=(h.pulse||0)+0.06;
  const glow=0.35+Math.sin(h.pulse)*0.2;
  // Outer glow ring
  ctx.strokeStyle=`rgba(60,255,130,${glow*0.5})`; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(0,0,22+Math.sin(h.pulse)*3,0,Math.PI*2); ctx.stroke();
  // Background circle
  ctx.fillStyle='rgba(10,30,18,0.92)';
  ctx.beginPath(); ctx.arc(0,0,16,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=`rgba(60,255,130,${0.7+glow*0.3})`; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(0,0,16,0,Math.PI*2); ctx.stroke();
  // Red cross
  ctx.fillStyle=`rgba(255,70,70,${0.85+glow*0.15})`;
  ctx.fillRect(-7,-2.5,14,5);
  ctx.fillRect(-2.5,-7,5,14);
  ctx.restore();
}

function drawDashTrails(){
  dashTrails=dashTrails.filter(t=>t.life>0);
  dashTrails.forEach(t=>{
    t.life--;
    const a=(t.life/t.maxLife)*0.45;
    ctx.save(); ctx.translate(t.x,t.y); ctx.rotate(t.angle);
    ctx.globalAlpha=a;
    ctx.strokeStyle='#88ccff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(0,0,28,13,0,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle='#aaddff'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.ellipse(-2,-2,22,9,0,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
    ctx.restore();
  });
}

function drawHealArrow(){
  if(!healItem) return;
  // Direction from screen center to item in world space
  const ang=Math.atan2(healItem.y-player.y, healItem.x-player.x);
  // Clamp to screen edge with margin
  const margin=28, cx=W/2, cy=H/2;
  // Check if item is already on screen
  const sx=healItem.x-camX, sy=healItem.y-camY;
  if(sx>margin&&sx<W-margin&&sy>margin&&sy<H-margin) return; // on screen, no arrow needed
  // Find edge intersection
  const slopes=[ (cy-margin)/Math.abs(Math.cos(ang)||0.001), (cx-margin)/Math.abs(Math.sin(ang)||0.001) ];
  const t=Math.min(...slopes.filter(s=>s>0));
  const ax=Math.max(margin,Math.min(W-margin, cx+Math.cos(ang)*t));
  const ay=Math.max(margin,Math.min(H-margin, cy+Math.sin(ang)*t));

  ctx.save(); ctx.translate(ax,ay); ctx.rotate(ang);
  const pulse=0.6+Math.sin(frame*0.1)*0.4;
  ctx.fillStyle=`rgba(60,255,130,${pulse})`;
  // Arrow shape
  ctx.beginPath(); ctx.moveTo(14,0); ctx.lineTo(-6,-8); ctx.lineTo(-2,0); ctx.lineTo(-6,8); ctx.closePath(); ctx.fill();
  ctx.strokeStyle=`rgba(20,100,50,${pulse})`; ctx.lineWidth=1.5; ctx.stroke();
  // Cross icon next to arrow
  ctx.fillStyle=`rgba(255,80,80,${pulse})`;
  ctx.fillRect(-18,-3,10,6); ctx.fillRect(-15,-7,4,14);
  ctx.restore();
}

function trackDamage(amount){
  if(healItem) return; // already one on screen
  dmgDealt+=amount;
  if(dmgDealt>=HEAL_DMG_THRESHOLD){ dmgDealt=0; spawnHealItem(); }
}

function updateHealItems(){
  if(levelState==='thanks'||!healItem) return;
  if(dist2(player.x,player.y,healItem.x,healItem.y)<(player.r+18)**2){
    lives=Math.min(lives+1,5);
    spawnExplosion(healItem.x,healItem.y,'#3cff82');
    sfx.levelup();
    healItem=null; dmgDealt=0;
  }
}

// ── HOMING MISSILES ───────────────────────────────────
function spawnHomingSplit(m){
  for(let s=-1;s<=1;s+=2){
    const a=m.angle+s*0.45;
    homingMissiles.push({x:m.x,y:m.y,vx:Math.cos(a)*8,vy:Math.sin(a)*8,angle:a,life:160,mini:true});
  }
}

function updateHomingMissiles(){
  homingMissiles=homingMissiles.filter(m=>{
    m.life--;
    // Steer toward nearest boss or enemy
    let tx=null, ty=null, bestD=1e9;
    bosses.forEach(b=>{ const d=dist2(m.x,m.y,b.x,b.y); if(d<bestD){bestD=d;tx=b.x;ty=b.y;} });
    if(tx===null) enemies.forEach(e=>{ const d=dist2(m.x,m.y,e.x,e.y); if(d<bestD){bestD=d;tx=e.x;ty=e.y;} });
    if(tx!==null){
      const desired=Math.atan2(ty-m.y,tx-m.x);
      let diff=desired-m.angle;
      while(diff>Math.PI) diff-=Math.PI*2; while(diff<-Math.PI) diff+=Math.PI*2;
      m.angle+=Math.sign(diff)*Math.min(Math.abs(diff),0.055);
    }
    m.vx=Math.cos(m.angle)*8; m.vy=Math.sin(m.angle)*8;
    m.x+=m.vx; m.y+=m.vy;
    // Hit enemy or boss
    for(let i=0;i<bosses.length;i++){
      if(dist2(m.x,m.y,bosses[i].x,bosses[i].y)<(bosses[i].w*0.45)**2){
        bosses[i].health-=3; bosses[i].hitFlash=10; trackDamage(3);
        spawnExplosion(m.x,m.y,'#00eeff'); sfx.hit();
        if(!m.mini) spawnHomingSplit(m);
        return false;
      }
    }
    for(let i=0;i<enemies.length;i++){
      if(dist2(m.x,m.y,enemies[i].x,enemies[i].y)<(enemies[i].w*0.45)**2){
        enemies[i].health-=3; enemies[i].hitFlash=10; trackDamage(3);
        spawnExplosion(m.x,m.y,'#00eeff'); sfx.hit();
        if(!m.mini) spawnHomingSplit(m);
        return false;
      }
    }
    return m.life>0;
  });
}

// ── LEVEL MANAGEMENT ──────────────────────────────────
function checkLevelProgress(){
  if(levelState!=='playing') return;
  const needed=XP_PER_LEVEL[level-1];
  if(xp>=needed){
    levelState='warning'; levelStateTimer=180; // 3s warning
    sfx.warning();
  }
}

function updateLevelState(){
  if(levelState==='warning'){
    levelStateTimer--;
    if(levelStateTimer<=0){
      levelState='boss'; enemies=[];
      if(level===1) spawnBoss('octopus');
      else if(level===2) spawnBoss('shark');
      else spawnBoss('cthulhu');
      // 1 second of invincibility so boss can't instant-hit on spawn
      player.invincible=true; player.invTimer=60;
    }
  } else if(levelState==='transition'){
    levelStateTimer--;
    if(levelStateTimer<=0){
      if(level===3){ levelState='thanks'; }
      else {
        level++; xp=0; levelState='playing'; levelStateTimer=0;
        enemies=[]; bossProjectiles=[];
        lives=3;
        // Grant level upgrade on entry
        if(level===3) hasHoming=true;
        sfx.levelup();
      }
    }
  }
}

function updateBosses(){
  if(levelState!=='boss') return;

  bosses.forEach(b=>{
    b.anim++;
    if(b.hitFlash>0) b.hitFlash--;
    if(b.spawnAlpha<1) b.spawnAlpha=Math.min(1,b.spawnAlpha+0.025); // ~40 frame fade-in

    if(b.type==='octopus'){
      // Orbit player slowly
      b.orbitAng+=(0.008+0.003*Math.sin(b.anim*0.02));
      const orbitR=220;
      const tx=player.x+Math.cos(b.orbitAng)*orbitR;
      const ty=player.y+Math.sin(b.orbitAng)*orbitR;
      b.vx+=(tx-b.x)*0.015; b.vy+=(ty-b.y)*0.015;
      b.vx*=0.92; b.vy*=0.92;
      b.x+=b.vx; b.y+=b.vy;
      // Fire 5-way ink spread every ~3s
      b.shootCD--;
      if(b.shootCD<=0){
        b.shootCD=180;
        const baseAng=Math.atan2(player.y-b.y,player.x-b.x);
        for(let s=-2;s<=2;s++){
          const a=baseAng+s*0.28;
          bossProjectiles.push({type:'ink',x:b.x,y:b.y,vx:Math.cos(a)*5,vy:Math.sin(a)*5,r:10,life:140});
        }
        sfx.inkblob();
      }
    }

    if(b.type==='shark'){
      // Eat nearest regular enemy (10s CD)
      b.eatCD--;
      if(b.eatCD<=0&&enemies.length>0){
        b.eatCD=600;
        // Find nearest
        let ni=-1, nd=1e9;
        enemies.forEach((e,i)=>{ const d=dist2(b.x,b.y,e.x,e.y); if(d<nd){nd=d;ni=i;} });
        if(ni>=0){ b.health=Math.min(b.maxHealth,b.health+20); enemies.splice(ni,1); sfx.chomp(); }
      }
      // Rush toward player (5s CD) — wind-up 60 frames, then rush 45 frames
      b.rushCD--;
      if(!b.rushing&&!b.windingUp&&b.rushCD<=0){
        b.windingUp=true; b.windTimer=60;
        const ang=Math.atan2(player.y-b.y,player.x-b.x);
        b.rushVx=Math.cos(ang)*15.84; b.rushVy=Math.sin(ang)*15.84; // 14.4 * 1.10
        sfx.warning();
      }
      if(b.windingUp){
        b.windTimer--;
        if(b.windTimer<=0){ b.windingUp=false; b.rushing=true; b.rushTimer=45; b.rushCD=300; sfx.phit(); }
      }
      if(b.rushing){
        b.x+=b.rushVx; b.y+=b.rushVy; b.rushTimer--;
        if(b.rushTimer<=0){ b.rushing=false; b.vx=b.rushVx*0.3; b.vy=b.rushVy*0.3; }
        const ang2=Math.atan2(b.rushVy,b.rushVx);
        b.drawAngle=ang2+Math.PI;
      } else {
        // Steer toward player
        const dx=player.x-b.x, dy=player.y-b.y;
        const d=Math.sqrt(dx*dx+dy*dy)||1;
        const spd=2.42; // 2.2 * 1.10
        b.vx+=(dx/d*spd-b.vx)*0.05; b.vy+=(dy/d*spd-b.vy)*0.05;
        b.x+=b.vx; b.y+=b.vy;
        const mag=Math.sqrt(b.vx*b.vx+b.vy*b.vy)||1;
        b.drawAngle=Math.atan2(b.vy/mag,b.vx/mag)+Math.PI;
      }
    }

    if(b.type==='cthulhu'){
      // Slow orbit/drift
      const dx=player.x-b.x, dy=player.y-b.y;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      const spd=b.phase===1?1.38:b.phase===2?1.84:2.3; // +15%
      b.vx+=(dx/d*spd-b.vx)*0.025; b.vy+=(dy/d*spd-b.vy)*0.025;
      b.x+=b.vx; b.y+=b.vy;
      // Shoot rocks toward player
      b.shootCD--;
      if(b.shootCD<=0){
        b.shootCD=b.phase===1?100:b.phase===2?70:50;
        const ang=Math.atan2(player.y-b.y,player.x-b.x)+(Math.random()-0.5)*0.4;
        // Fire 2 rocks — one aimed, one offset by ~25°
        bossProjectiles.push({type:'rock',x:b.x,y:b.y,vx:Math.cos(ang)*3.5,vy:Math.sin(ang)*3.5,r:13,life:180});
        const ang2=ang+0.44;
        bossProjectiles.push({type:'rock',x:b.x,y:b.y,vx:Math.cos(ang2)*3.5,vy:Math.sin(ang2)*3.5,r:13,life:180});
        sfx.rockimp();
      }
    }
  });

  // Boss projectile movement + player collision
  bossProjectiles=bossProjectiles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.life--;
    if(dist2(p.x,p.y,player.x,player.y)<(player.r+p.r)**2) { hitPlayer(); return false; }
    return p.life>0;
  });

  // Torpedo/rocket vs boss
  bullets=bullets.filter(b2=>{
    if(b2.life<=0) return false;
    let hit=false;
    for(let i=0;i<bosses.length;i++){
      const b=bosses[i];
      if(dist2(b2.x,b2.y,b.x,b.y)<(b.w*0.45)**2){ b.health--; b.hitFlash=10; trackDamage(1); sfx.hit(); hit=true; break; }
    }
    return !hit;
  });

  // Homing missiles vs boss
  homingMissiles=homingMissiles.filter(m=>{
    let hit=false;
    for(let i=0;i<bosses.length;i++){
      const b=bosses[i];
      if(dist2(m.x,m.y,b.x,b.y)<(b.w*0.45)**2){ b.health-=3; b.hitFlash=10; trackDamage(3); spawnExplosion(m.x,m.y,'#00eeff'); sfx.hit(); hit=true; break; }
    }
    return !hit;
  });

  // Boss vs player contact
  bosses.forEach(b=>{
    if(b.spawnAlpha>=1&&dist2(player.x,player.y,b.x,b.y)<(player.r+b.w*0.35)**2){
      if(b.type==='shark'&&b.rushing){
        // Rush hit = instant kill regardless of invincibility
        lives=0; state='gameover'; autoFire=false;
        if(score>highScore){ highScore=score; localStorage.setItem('dsa_hs',highScore); }
        spawnBigExplosion(player.x,player.y); sfx.over();
      } else {
        hitPlayer();
      }
    }
  });

  // Handle dead bosses
  const prevCount=bosses.length;
  bosses=bosses.filter(b=>{
    if(b.health<=0){
      spawnBigExplosion(b.x,b.y); sfx.explode(); return false;
    }
    return true;
  });

  if(bosses.length===0&&prevCount>0){
    bossProjectiles=[];
    // Cthulhu phase check
    if(level===3&&cthulhuPhase<3){
      cthulhuPhase++; spawnCthulhuPhase(cthulhuPhase); return;
    }
    // Boss fully defeated — grant ability + go to transition
    if(level===1){ backupCount=1; octopusBossDefeated=true; }
    else if(level===2) backupCount=2;
    // level 3 homing already granted on level entry
    levelState='transition'; levelStateTimer=240;
    sfx.levelup();
  }
}

// ── UPDATE ────────────────────────────────────────────
function update(){
  frame++;
  if(state!=='playing'&&levelState!=='thanks') return;
  if(state!=='playing') return;

  difficulty=1+frame/3600;
  spawnRate=Math.max(36,120-difficulty*13);

  // Level state machine
  updateLevelState();
  if(levelState==='boss'||levelState==='transition'||levelState==='warning'||levelState==='thanks') {
    // Still update camera and input even during boss/transition
    const mxWorld=mxScreen+camX, myWorld=myScreen+camY;
    player.angle=Math.atan2(myWorld-player.y,mxWorld-player.x);
    const spd2=player.speed;
    let vx2=0,vy2=0;
    if(keys['ArrowUp']   ||keys['KeyW']) vy2=-spd2;
    if(keys['ArrowDown'] ||keys['KeyS']) vy2= spd2;
    if(keys['ArrowLeft'] ||keys['KeyA']) vx2=-spd2;
    if(keys['ArrowRight']||keys['KeyD']) vx2= spd2;
    if(vx2&&vy2){ vx2*=0.707; vy2*=0.707; }
    player.x=Math.max(40,Math.min(WORLD_W-40,player.x+vx2));
    player.y=Math.max(40,Math.min(WORLD_H-40,player.y+vy2));
    camX+=(player.x-W/2-camX)*0.1; camY+=(player.y-H/2-camY)*0.1;
    const willShoot2=autoFire&&player.shootCD===0;
    if(autoFire) shoot();
    if(willShoot2) fireBackupSubs();
    if(player.shootCD>0) player.shootCD--;
    if(player.invincible){ player.invTimer--; if(player.invTimer<=0) player.invincible=false; }
    bullets=bullets.filter(b=>b.life>0);
    bullets.forEach(b=>{ b.x+=b.vx; b.y+=b.vy; b.life--; });
    // Rockets (with homing)
    const dR2=[]; rockets=rockets.filter(r=>{
      if(r.homing){
        let tx=null,ty=null,bd=1e9;
        bosses.forEach(b=>{ const d=dist2(r.x,r.y,b.x,b.y); if(d<bd){bd=d;tx=b.x;ty=b.y;} });
        if(tx===null) enemies.forEach(e=>{ const d=dist2(r.x,r.y,e.x,e.y); if(d<bd){bd=d;tx=e.x;ty=e.y;} });
        if(tx!==null){
          const desired=Math.atan2(ty-r.y,tx-r.x);
          let diff=desired-r.angle; while(diff>Math.PI) diff-=Math.PI*2; while(diff<-Math.PI) diff+=Math.PI*2;
          r.angle+=Math.sign(diff)*Math.min(Math.abs(diff),0.04);
          r.vx=Math.cos(r.angle)*7.5; r.vy=Math.sin(r.angle)*7.5;
        }
      }
      r.x+=r.vx; r.y+=r.vy; r.life--;
      for(let i=0;i<bosses.length;i++){ if(dist2(r.x,r.y,bosses[i].x,bosses[i].y)<(bosses[i].w*0.45)**2){ dR2.push(r); return false; } }
      for(let i=0;i<enemies.length;i++){ if(dist2(r.x,r.y,enemies[i].x,enemies[i].y)<(enemies[i].w*0.52)**2){ dR2.push(r); return false; } }
      const off=r.x<camX-120||r.x>camX+W+120||r.y<camY-120||r.y>camY+H+120||r.life<=0;
      if(off) dR2.push(r); return !off; });
    dR2.forEach(r=>rocketExplode(r));
    for(let i=rocketTimers.length-1;i>=0;i--){ rocketTimers[i]--; if(rocketTimers[i]<=0&&rocketAmmo<ROCKET_MAX){ rocketAmmo++; rocketTimers.splice(i,1); } }
    if(homingCD>0) homingCD--;
    // Dash
    if(dashCD>0) dashCD--;
    if(dashTimer>0){
      dashTrails.push({x:player.x,y:player.y,angle:player.angle,life:10,maxLife:10});
      player.x=Math.max(40,Math.min(WORLD_W-40,player.x+dashVx));
      player.y=Math.max(40,Math.min(WORLD_H-40,player.y+dashVy));
      dashTimer--;
    }
    updateHomingMissiles();
    if(levelState==='boss'){
      updateBosses();
      // Enemy movement + torpedo collision during boss
      enemies.forEach(e=>{
        e.anim++;
        const dx=player.x-e.x, dy=player.y-e.y, dist3=Math.sqrt(dx*dx+dy*dy)||1;
        const steer=e.type==='jellyfish'?0.02:0.065;
        e.vx+=(dx/dist3*e.speed-e.vx)*steer; e.vy+=(dy/dist3*e.speed-e.vy)*steer;
        if(e.type==='jellyfish'){ e.vx+=Math.cos(e.anim*0.07)*0.38; e.vy+=Math.sin(e.anim*0.09)*0.38; }
        e.x+=e.vx; e.y+=e.vy;
        const mag=Math.sqrt(e.vx*e.vx+e.vy*e.vy)||1;
        e.moveAng=Math.atan2(e.vy/mag,e.vx/mag); e.drawAngle=e.moveAng+Math.PI;
        if(e.hitFlash>0) e.hitFlash--;
        if(dist2(player.x,player.y,e.x,e.y)<(player.r+e.w*0.38)**2) hitPlayer();
      });
      bullets=bullets.filter(b2=>{
        if(b2.life<=0) return false;
        let hit=false;
        for(let i=0;i<enemies.length;i++){
          if(dist2(b2.x,b2.y,enemies[i].x,enemies[i].y)<(enemies[i].w*0.42)**2){ enemies[i].health--; enemies[i].hitFlash=10; trackDamage(1); sfx.hit(); hit=true; break; }
        }
        return !hit;
      });
      enemies=enemies.filter(e=>{ if(e.health<=0){ spawnExplosion(e.x,e.y,e.color); score+=e.pts||e.points||0; sfx.explode(); return false; } return dist2(e.x,e.y,player.x,player.y)<(W+200)**2; });
      // Enemy spawning continues during boss
      spawnTimer++; if(spawnTimer>=spawnRate){ spawnTimer=0; spawnEnemy(); }
    }
    updateHealItems();
    updateParticles();
    return;
  }

  // Convert screen mouse pos to world space for aiming
  const mxWorld=mxScreen+camX;
  const myWorld=myScreen+camY;
  player.angle=Math.atan2(myWorld-player.y, mxWorld-player.x);

  // Movement
  const spd=player.speed;
  let vx=0,vy=0;
  if(keys['ArrowUp']   ||keys['KeyW']) vy=-spd;
  if(keys['ArrowDown'] ||keys['KeyS']) vy= spd;
  if(keys['ArrowLeft'] ||keys['KeyA']) vx=-spd;
  if(keys['ArrowRight']||keys['KeyD']) vx= spd;
  if(vx&&vy){ vx*=0.707; vy*=0.707; }
  // Player moves freely in world (soft world bounds)
  player.x=Math.max(40,Math.min(WORLD_W-40,player.x+vx));
  player.y=Math.max(40,Math.min(WORLD_H-40,player.y+vy));

  // Smooth camera follow
  const targetCamX=player.x-W/2;
  const targetCamY=player.y-H/2;
  camX+=(targetCamX-camX)*0.1;
  camY+=(targetCamY-camY)*0.1;

  // Dash
  if(dashCD>0) dashCD--;
  if(dashTimer>0){
    dashTrails.push({x:player.x,y:player.y,angle:player.angle,life:10,maxLife:10});
    player.x=Math.max(40,Math.min(WORLD_W-40,player.x+dashVx));
    player.y=Math.max(40,Math.min(WORLD_H-40,player.y+dashVy));
    dashTimer--;
  }

  // Homing CD
  if(homingCD>0) homingCD--;
  updateHomingMissiles();

  // Auto-fire (main + backup subs fire on same frame)
  const willShoot=autoFire&&player.shootCD===0;
  if(autoFire) shoot();
  if(willShoot) fireBackupSubs();
  if(player.shootCD>0) player.shootCD--;
  if(player.invincible){ player.invTimer--; if(player.invTimer<=0) player.invincible=false; }

  // Torpedoes
  bullets=bullets.filter(b=>b.life>0);
  bullets.forEach(b=>{ b.x+=b.vx; b.y+=b.vy; b.life--; });

  // Rockets — homing steer + contact check
  const deadRockets=[];
  rockets=rockets.filter(r=>{
    // Homing steering toward nearest boss/enemy
    if(r.homing){
      let tx=null, ty=null, bd=1e9;
      bosses.forEach(b=>{ const d=dist2(r.x,r.y,b.x,b.y); if(d<bd){bd=d;tx=b.x;ty=b.y;} });
      if(tx===null) enemies.forEach(e=>{ const d=dist2(r.x,r.y,e.x,e.y); if(d<bd){bd=d;tx=e.x;ty=e.y;} });
      if(tx!==null){
        const desired=Math.atan2(ty-r.y,tx-r.x);
        let diff=desired-r.angle;
        while(diff>Math.PI) diff-=Math.PI*2; while(diff<-Math.PI) diff+=Math.PI*2;
        r.angle+=Math.sign(diff)*Math.min(Math.abs(diff),0.04);
        r.vx=Math.cos(r.angle)*7.5; r.vy=Math.sin(r.angle)*7.5;
      }
    }
    r.x+=r.vx; r.y+=r.vy; r.life--;
    // Contact with any boss → explode
    for(let i=0;i<bosses.length;i++){
      if(dist2(r.x,r.y,bosses[i].x,bosses[i].y)<(bosses[i].w*0.45)**2){
        deadRockets.push(r); return false;
      }
    }
    // Contact with any enemy → explode immediately
    for(let i=0;i<enemies.length;i++){
      const e=enemies[i];
      if(dist2(r.x,r.y,e.x,e.y)<(e.w*0.52)**2){
        deadRockets.push(r); return false;
      }
    }
    // Off viewport or expired
    const offscreen=r.x<camX-120||r.x>camX+W+120||r.y<camY-120||r.y>camY+H+120||r.life<=0;
    if(offscreen) deadRockets.push(r);
    return !offscreen;
  });
  deadRockets.forEach(r=>rocketExplode(r));

  // Rocket reload timers
  for(let i=rocketTimers.length-1;i>=0;i--){
    rocketTimers[i]--;
    if(rocketTimers[i]<=0&&rocketAmmo<ROCKET_MAX){ rocketAmmo++; rocketTimers.splice(i,1); }
  }

  // Enemy spawn
  spawnTimer++;
  if(spawnTimer>=spawnRate){
    spawnTimer=0; spawnEnemy();
    if(difficulty>2&&Math.random()<0.32) spawnEnemy();
  }

  // Move enemies (steer toward player)
  enemies.forEach(e=>{
    e.anim++;
    const dx=player.x-e.x, dy=player.y-e.y;
    const dist=Math.sqrt(dx*dx+dy*dy)||1;
    const steer=e.type==='jellyfish'?0.02:0.065;
    e.vx+=(dx/dist*e.speed-e.vx)*steer;
    e.vy+=(dy/dist*e.speed-e.vy)*steer;
    if(e.type==='jellyfish'){ e.vx+=Math.cos(e.anim*0.07)*0.38; e.vy+=Math.sin(e.anim*0.09)*0.38; }
    // Octopus regular enemy: shoots faster after boss defeated
    if(e.type==='octopus'){
      if(!e.shootCD) e.shootCD=80+Math.floor(Math.random()*60);
      e.shootCD--;
      if(e.shootCD<=0){
        e.shootCD=octopusBossDefeated?90:200;
        const ang=Math.atan2(player.y-e.y,player.x-e.x);
        bossProjectiles.push({type:'ink',x:e.x,y:e.y,vx:Math.cos(ang)*4,vy:Math.sin(ang)*4,r:9,life:120});
        sfx.inkblob();
      }
    }
    // Shark regular enemy: occasional burst of speed
    if(e.type==='shark'){
      if(!e.burstCD) e.burstCD=200+Math.floor(Math.random()*100);
      e.burstCD--;
      if(e.burstCD<=0){ e.burstCD=300; e.speed=e.speed*2; setTimeout(()=>{ e.speed=e.speed/2; },800); }
    }
    e.x+=e.vx; e.y+=e.vy;
    const mag=Math.sqrt(e.vx*e.vx+e.vy*e.vy)||1;
    e.moveAng=Math.atan2(e.vy/mag,e.vx/mag);
    e.drawAngle=e.moveAng+Math.PI;
    if(e.hitFlash>0) e.hitFlash--;
  });

  // Torpedo vs enemy
  bullets=bullets.filter(b=>{
    if(b.life<=0) return false;
    let hit=false;
    for(let i=0;i<enemies.length;i++){
      const e=enemies[i];
      if(dist2(b.x,b.y,e.x,e.y)<(e.w*0.42)**2){ e.health--; e.hitFlash=10; trackDamage(1); sfx.hit(); hit=true; break; }
    }
    return !hit;
  });

  // Kill dead enemies
  enemies=enemies.filter(e=>{
    if(e.health<=0){
      spawnExplosion(e.x,e.y,e.color); spawnPopup(e.x,e.y-20,e.points);
      sfx.explode(); score+=e.points; xp+=e.points;
      checkLevelProgress();
      return false;
    }
    // Cull if very far from player
    return dist2(e.x,e.y,player.x,player.y)<(W+200)**2;
  });

  // Enemy hits player
  enemies.forEach(e=>{
    if(dist2(player.x,player.y,e.x,e.y)<(player.r+e.w*0.38)**2) hitPlayer();
  });

  // Boss projectiles (ink from regular octopus enemies) hit player
  bossProjectiles=bossProjectiles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.life--;
    if(dist2(p.x,p.y,player.x,player.y)<(player.r+p.r)**2){ hitPlayer(); return false; }
    return p.life>0;
  });

  updateHealItems();
  updateParticles();
}

// ── DRAW ──────────────────────────────────────────────
function draw(){
  // Hard-reset canvas state every frame so a missed ctx.restore() in a
  // previous frame can never cause transforms or alpha to accumulate.
  ctx.setTransform(1,0,0,1,0,0);
  ctx.globalAlpha=1;
  ctx.clearRect(0,0,W,H);

  if(state==='menu') { drawMenu(); return; }

  // Apply camera transform for all world-space drawing.
  // try/finally guarantees ctx.restore() runs even if a draw function throws.
  ctx.save();
  ctx.translate(-camX,-camY);
  try {
    drawWorldBg();
    bullets.forEach(drawTorpedo);
    rockets.forEach(drawRocket);

    enemies.forEach(e=>{
      ctx.save();
      if(e.hitFlash>0) ctx.globalAlpha=0.35+Math.abs(Math.sin(e.hitFlash*0.9))*0.65;
      if(e.type==='clownfish')  drawClownfish(e);
      if(e.type==='jellyfish')  drawJellyfish(e);
      if(e.type==='pufferfish') drawPufferfish(e);
      if(e.type==='anglerfish') drawAnglerfish(e);
      if(e.type==='octopus')    drawOctopus(e);
      if(e.type==='shark')      drawShark(e);
      ctx.restore();
      drawHealthBar(e);
    });

    // Boss enemies
    bosses.forEach(b=>{
      ctx.save();
      const baseAlpha=b.spawnAlpha??1;
      ctx.globalAlpha=b.hitFlash>0
        ? baseAlpha*(0.35+Math.abs(Math.sin(b.hitFlash*0.9))*0.65)
        : baseAlpha;
      if(b.type==='octopus') drawBossOctopus(b);
      if(b.type==='shark')   drawBossShark(b);
      if(b.type==='cthulhu') drawBossCthulhu(b);
      ctx.restore();
      // Wind-up exclamation mark above shark (drawn after restore, in unrotated world space)
      if(b.type==='shark'&&b.windingUp){
        const wp=Math.sin(b.windTimer*0.25);
        ctx.save(); ctx.translate(b.x,b.y);
        ctx.fillStyle=`rgba(255,60,60,${0.75+wp*0.25})`; ctx.font=`bold ${30+Math.floor(wp*6)}px monospace`; ctx.textAlign='center';
        ctx.fillText('!',0,-b.h/2-42);
        ctx.textAlign='left'; ctx.restore();
      }
      // Boss HP bar over sprite
      const bw2=90, bh2=8, bx2=b.x-bw2/2, by2=b.y-b.h/2-22;
      ctx.fillStyle='#1a0808'; ctx.fillRect(bx2,by2,bw2,bh2);
      const hpG=ctx.createLinearGradient(bx2,0,bx2+bw2,0);
      hpG.addColorStop(0,'#cc2222'); hpG.addColorStop(1,'#ff6644');
      ctx.fillStyle=hpG; ctx.fillRect(bx2,by2,bw2*(b.health/b.maxHealth),bh2);
      ctx.strokeStyle='#440000'; ctx.lineWidth=1; ctx.strokeRect(bx2,by2,bw2,bh2);
    });

    // Homing missiles
    homingMissiles.forEach(drawHomingMissile);

    // Boss projectiles (ink blobs, rocks)
    bossProjectiles.forEach(p=>{
      if(p.type==='ink'){
        ctx.fillStyle='rgba(80,0,120,0.85)';
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='rgba(140,0,200,0.5)'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.stroke();
      } else {
        ctx.fillStyle='#6a5a44';
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#8a7a64';
        ctx.beginPath(); ctx.arc(p.x-p.r*0.28,p.y-p.r*0.28,p.r*0.42,0,Math.PI*2); ctx.fill();
      }
    });

    if(healItem) drawHealItem(healItem);
    drawDashTrails();
    drawBackupSubs();
    drawSub();
    drawParticles();
    updateDrawPopups();
  } finally {
    ctx.restore(); // always undo camera transform
  }

  // Screen-space elements (drawn after camera restore)
  ctx.globalAlpha=1;
  drawScreenBubbles();
  drawHealArrow();
  drawHUD();

  if(state==='gameover') drawGameOver();
  if(levelState==='warning')    drawWarningScreen();
  if(levelState==='transition') drawTransitionScreen();
  if(levelState==='thanks')     drawThanksScreen();
}

// ── LOOP ──────────────────────────────────────────────
function loop(){
  try{ update(); draw(); }catch(e){ console.error('[DSA]',e); }
  requestAnimationFrame(loop);
}

initBg();
loop();
</script>
